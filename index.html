<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bear Travel Planner</title>
<style>
:root{--bg:#f7efe4;--card:#fffaf3;--brown:#563b2b;--accent:#b87545;--soft:#ead8c4;--line:#e6cfb8;--note:#936943;--drive:#c06f3d}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--brown);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif}
header{position:sticky;top:0;z-index:9;background:rgba(255,250,243,.96);padding:14px;border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
h1{margin:0;font-family:"Kaiti TC","KaiTi",serif;font-size:27px}.sub{font-size:13px;color:#946a49;margin-top:4px}
nav{display:flex;gap:8px;overflow:auto;margin-top:12px}nav button{border:0;border-radius:999px;padding:9px 14px;background:#f0dfcc;color:var(--brown);white-space:nowrap}
nav button.on,.btn{background:var(--accent);color:white}.btn{border:0;border-radius:14px;padding:11px 14px;font-weight:700;margin:3px}.btn2{background:#8b6548}.danger{background:#b95b4a}
main{padding:15px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px;margin:12px 0;box-shadow:0 8px 22px #8b5e3c18}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px;margin:6px 0;background:white;color:var(--brown);font-size:16px}
textarea{min-height:68px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pic{width:100%;max-height:190px;object-fit:cover;border-radius:16px;margin:8px 0}
.money{font-size:23px;font-weight:800}.small{font-size:13px;color:#946a49}.tag{display:inline-block;background:#f1dfcc;border-radius:999px;padding:5px 9px;margin:3px;font-size:13px}
.drive{color:var(--drive);font-weight:700}.note{color:var(--note);background:#fff4e8;border-radius:12px;padding:9px}a{color:var(--accent);font-weight:700}
.trip{cursor:pointer}.topline{display:flex;justify-content:space-between;align-items:center;gap:8px}.areaTitle{margin-top:20px;border-left:5px solid var(--accent);padding-left:9px}
</style>
</head>
<body>
<header>
<h1>🧸 Bear Travel Planner</h1>
<div class="sub" id="sub">Every journey becomes a beautiful memory. 🍂</div>
<nav id="nav"></nav>
</header>
<main id="app"></main>

<script>
const tabs=["總覽","航班","D1","D2","D3","D4","D5","記帳","分攤","必買"];
const types=["🏯 景點","🍜 美食","🛍 購物","☕ 咖啡廳","🌃 夜景"];
const transport=["🚗 開車","🚶‍♀️ 走路","🚕 計程車","🚆 大眾交通"];
const cur=["JPY","TWD","KRW","THB"];
const areas=["福岡機場","博多","天神","太宰府","由布院","其他"];
let tab=0, tripId=null;

let store=JSON.parse(localStorage.getItem("bearMultiTrip")||`{"trips":[]}`);
if(!store.trips.length){
 store.trips.push(newTrip("🍁 福岡 Autumn","2026.10.10－10.14",["爸爸","媽媽","弟弟","妹妹","🐻","👦🏻"]));
 tripId=store.trips[0].id; save();
}else tripId=store.trips[0].id;

function newTrip(name,date,members=[]){return {id:Date.now()+Math.random(),name,date,members,rates:{JPY:.21,TWD:1,KRW:.023,THB:.9},flight:{go:"",back:"",note:""},days:[[],[],[],[],[]],expenses:[],splits:[],buy:[]}}
function save(){localStorage.setItem("bearMultiTrip",JSON.stringify(store))}
function trip(){return store.trips.find(x=>x.id==tripId)}
function twd(a,c){let t=trip();return Math.round(Number(a||0)*(t.rates[c]||1))}
function img(input,cb){let f=input.files[0];if(!f)return cb("");let r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(f)}
function setTab(i){tab=i;render()}
function renderNav(){nav.innerHTML=(tripId?tabs:["旅程"]).map((p,i)=>`<button class="${i==tab?'on':''}" onclick="setTab(${i})">${p}</button>`).join("")}
function render(){renderNav();sub.textContent=tripId?trip().name+"｜"+trip().date:"Every journey becomes a beautiful memory. 🍂"; app.innerHTML=tripId?[home,flight,d1,d2,d3,d4,d5,expense,split,buy][tab]():tripList()}
function goList(){tripId=null;tab=0;render()}
function selectTrip(id){tripId=id;tab=0;render()}

function tripList(){
return `<div class="card"><h2>🧸 我的旅程</h2>
<input id="tn" placeholder="旅程名稱，例如：🌸 東京 Spring">
<input id="td" placeholder="日期，例如：2027.03.20－03.25">
<input id="tm" placeholder="旅伴，用逗號分隔，例如：🐻,媽媽,朋友A">
<button class="btn" onclick="addTrip()">新增旅程</button></div>
${store.trips.map(x=>`<div class="card trip" onclick="selectTrip(${x.id})"><h2>${x.name}</h2><p>${x.date}</p><p class="small">旅伴：${x.members.join("、")||"尚未設定"}</p></div>`).join("")}`;
}
function addTrip(){store.trips.push(newTrip(tn.value||"未命名旅程",td.value||"",tm.value?tm.value.split(",").map(x=>x.trim()):[]));save();render()}

function home(){
let t=trip(), count=t.days.flat().length;
return `<div class="card"><button class="btn btn2" onclick="goList()">← 回旅程列表</button><h2>${t.name}</h2><p>${t.date}</p>
<div class="grid"><div class="card"><b>行程</b><div class="money">${count}</div></div><div class="card"><b>記帳</b><div class="money">${t.expenses.length}</div></div><div class="card"><b>分攤</b><div class="money">${t.splits.length}</div></div><div class="card"><b>必買</b><div class="money">${t.buy.length}</div></div></div>
<h3>旅伴設定</h3><input id="mem" value="${t.members.join(",")}" placeholder="用逗號分隔"><button class="btn" onclick="t.members=mem.value.split(',').map(x=>x.trim()).filter(Boolean);save();render()">更新旅伴</button>
<button class="btn" onclick="setTab(2)">開始規劃 Day1</button></div>`;
}

function rateBox(){let t=trip();return `<div class="card"><h3>匯率設定</h3>${cur.map(c=>`<label>${c}<input type="number" step="0.001" value="${t.rates[c]}" onchange="t.rates['${c}']=Number(this.value);save();render()"></label>`).join("")}</div>`}

function flight(){let t=trip();return `<div class="card"><h2>✈️ 航班</h2><textarea id="go" placeholder="去程資訊">${t.flight.go}</textarea><textarea id="back" placeholder="回程資訊">${t.flight.back}</textarea><textarea id="fnote" placeholder="備註">${t.flight.note}</textarea><button class="btn" onclick="t.flight={go:go.value,back:back.value,note:fnote.value};save();render()">儲存</button></div>`}

function dayPage(d){
let list=trip().days[d];
return `<div class="card"><h2>🍂 Day ${d+1}</h2>
<select id="type">${types.map(x=>`<option>${x}</option>`).join("")}</select><input id="name" placeholder="名稱"><input id="map" placeholder="Google Maps 連結">
<select id="trans">${transport.map(x=>`<option>${x}</option>`).join("")}</select><input id="time" placeholder="移動時間，例如 20 分鐘">
<textarea id="memo" placeholder="備註"></textarea><input id="photo" type="file" accept="image/*"><button class="btn" onclick="addDay(${d})">新增行程</button></div>
${list.map((x,i)=>`<div class="card" draggable="true" ondragstart="dragI=${i}" ondragover="event.preventDefault()" ondrop="dropDay(${d},${i})">
${x.photo?`<img class="pic" src="${x.photo}">`:""}<h3>${x.type} ${x.name}</h3><p class="drive">${x.trans}｜${x.time||"未填時間"}</p>
${x.memo?`<p class="note">📝 ${x.memo}</p>`:""}${x.map?`<p><a href="${x.map}" target="_blank">📍 開啟導航</a></p>`:""}
<button class="btn btn2" onclick="moveDay(${d},${i},-1)">上移</button><button class="btn btn2" onclick="moveDay(${d},${i},1)">下移</button><button class="btn danger" onclick="delDay(${d},${i})">刪除</button></div>`).join("")}`;
}
function d1(){return dayPage(0)}function d2(){return dayPage(1)}function d3(){return dayPage(2)}function d4(){return dayPage(3)}function d5(){return dayPage(4)}
function addDay(d){img(photo,b=>{trip().days[d].push({type:type.value,name:name.value,map:map.value,trans:trans.value,time:time.value,memo:memo.value,photo:b});save();render()})}
function delDay(d,i){trip().days[d].splice(i,1);save();render()}
function moveDay(d,i,dir){let a=trip().days[d],j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render()}
let dragI=null;function dropDay(d,i){let a=trip().days[d],x=a.splice(dragI,1)[0];a.splice(i,0,x);save();render()}

function expense(){
let t=trip(), totals={JPY:0,TWD:0,KRW:0,THB:0}, total=0;t.expenses.forEach(x=>{totals[x.cur]+=Number(x.amount||0);total+=twd(x.amount,x.cur)});
return `${rateBox()}<div class="card"><h2>💰 記帳</h2><div class="grid">${cur.map(c=>`<div class="card"><b>${c}</b><div class="money">${totals[c]}</div></div>`).join("")}</div><div class="card"><b>約台幣總額</b><div class="money">NT$ ${total}</div></div>
<input id="en" placeholder="項目名稱"><input id="ea" type="number" placeholder="金額"><select id="ec">${cur.map(c=>`<option>${c}</option>`).join("")}</select><textarea id="em" placeholder="備註"></textarea><input id="er" type="file" accept="image/*"><button class="btn" onclick="addExpense()">新增記帳</button></div>
${t.expenses.map((x,i)=>`<div class="card">${x.receipt?`<img class="pic" src="${x.receipt}">`:""}<h3>${x.name}</h3><div class="money">${x.amount} ${x.cur}</div><p>約 NT$ ${twd(x.amount,x.cur)}</p>${x.memo?`<p class="note">📝 ${x.memo}</p>`:""}<button class="btn danger" onclick="delExpense(${i})">刪除</button></div>`).join("")}`;
}
function addExpense(){img(er,b=>{trip().expenses.push({name:en.value,amount:ea.value,cur:ec.value,memo:em.value,receipt:b});save();render()})}
function delExpense(i){trip().expenses.splice(i,1);save();render()}

function split(){
let t=trip(), sums={};t.members.forEach(m=>sums[m]=0);t.splits.forEach(x=>x.people.forEach(p=>sums[p]+=twd(x.amount,x.cur)/x.people.length));
return `${rateBox()}<div class="card"><h2>👨‍👩‍👧‍👦 分攤</h2><div class="grid">${t.members.map(m=>`<div class="card"><b>${m}</b><div class="money">NT$ ${Math.round(sums[m]||0)}</div></div>`).join("")}</div>
<input id="sn" placeholder="項目"><input id="sa" type="number" placeholder="總金額"><select id="sc">${cur.map(c=>`<option>${c}</option>`).join("")}</select>
<div>${t.members.map(m=>`<label class="tag"><input type="checkbox" name="sp" value="${m}"> ${m}</label>`).join("")}</div><button class="btn" onclick="addSplit()">新增分攤</button></div>
${t.splits.map((x,i)=>`<div class="card"><h3>${x.name}</h3><div class="money">${x.amount} ${x.cur}</div><p>約 NT$ ${twd(x.amount,x.cur)}</p><p>分攤：${x.people.join("、")}</p><p>每人：約 NT$ ${Math.round(twd(x.amount,x.cur)/x.people.length)}</p><button class="btn danger" onclick="delSplit(${i})">刪除</button></div>`).join("")}`;
}
function addSplit(){let people=[...document.querySelectorAll("input[name=sp]:checked")].map(x=>x.value);if(!people.length)return alert("請勾選分攤成員");trip().splits.push({name:sn.value,amount:sa.value,cur:sc.value,people});save();render()}
function delSplit(i){trip().splits.splice(i,1);save();render()}

function buy(){
let t=trip();
let grouped={};areas.forEach(a=>grouped[a]=[]);t.buy.forEach((x,i)=>(grouped[x.area]||grouped["其他"]).push({...x,i}));
return `<div class="card"><h2>🛍 必買</h2><p class="small">可依照會經過的地區分類，旅途中比較好找。</p>
<input id="bn" placeholder="商品名稱"><select id="ba">${areas.map(a=>`<option>${a}</option>`).join("")}</select><textarea id="bm" placeholder="備註，例如：天神地下街經過再買"></textarea><input id="bp" type="file" accept="image/*"><button class="btn" onclick="addBuy()">新增</button></div>
${areas.map(a=>grouped[a].length?`<h3 class="areaTitle">${a}</h3><div class="grid">${grouped[a].map(x=>`<div class="card">${x.pic?`<img class="pic" src="${x.pic}">`:""}<h3>${x.name}</h3>${x.memo?`<p class="note">${x.memo}</p>`:""}<button class="btn danger" onclick="delBuy(${x.i})">刪除</button></div>`).join("")}</div>`:"").join("")}`;
}
function addBuy(){img(bp,b=>{trip().buy.push({name:bn.value,area:ba.value,memo:bm.value,pic:b});save();render()})}
function delBuy(i){trip().buy.splice(i,1);save();render()}

render();
</script>
</body>
</html>
