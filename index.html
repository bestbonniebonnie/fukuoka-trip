<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bear Travel Planner</title>
<style>
:root{--bg:#f7efe4;--card:#fffaf3;--brown:#563b2b;--soft:#ead8c4;--accent:#b87545;--line:#e5ceb7;--note:#9b6b43;--drive:#c06f3d}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--brown);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif}
header{position:sticky;top:0;z-index:9;background:rgba(255,250,243,.96);padding:14px;border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
h1{margin:0;font-family:"Kaiti TC","KaiTi",serif;font-size:28px}
.sub{font-size:13px;color:#9b6b43;margin-top:4px}
nav{display:flex;gap:8px;overflow:auto;margin-top:12px}
nav button{border:0;border-radius:999px;padding:9px 14px;background:#f0dfcc;color:var(--brown);white-space:nowrap}
nav button.on{background:var(--accent);color:white}
main{padding:15px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px;margin:12px 0;box-shadow:0 8px 22px #8b5e3c18}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px;margin:6px 0;background:white;color:var(--brown);font-size:16px}
textarea{min-height:70px}
.btn{border:0;border-radius:14px;padding:11px 14px;background:var(--accent);color:white;font-weight:700;margin:3px}
.btn2{background:#8b6548}.danger{background:#b95b4a}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pic{width:100%;max-height:190px;object-fit:cover;border-radius:16px;margin:8px 0}
.money{font-size:24px;font-weight:800}
.small{font-size:13px;color:#9b6b43}
.drive{color:var(--drive);font-weight:700}
.note{color:var(--note);background:#fff4e8;border-radius:12px;padding:9px}
.tag{display:inline-block;background:#f1dfcc;border-radius:999px;padding:5px 9px;margin:3px;font-size:13px}
a{color:var(--accent);font-weight:700}
</style>
</head>
<body>
<header>
<h1>рҹ§ё Bear Travel Planner</h1>
<div class="sub">рҹҚҒ зҰҸеІЎ AutumnпҪңEvery journey becomes a beautiful memory.</div>
<nav id="nav"></nav>
</header>
<main id="app"></main>

<script>
const pages=["йҰ–й Ғ","иҲӘзҸӯ","D1","D2","D3","D4","D5","иЁҳеёі","еҲҶж”Ө","еҝ…иІ·"];
const types=["рҹҸҜ жҷҜй»һ","рҹҚң зҫҺйЈҹ","рҹӣҚ иіјзү©","вҳ• е’–е•Ўе»і","рҹҢғ еӨңжҷҜ"];
const transport=["рҹҡ— й–Ӣи»Ҡ","рҹҡ¶вҖҚвҷҖпёҸ иө°и·Ҝ","рҹҡ• иЁҲзЁӢи»Ҡ","рҹҡҶ еӨ§зңҫдәӨйҖҡ"];
const members=["зҲёзҲё","еӘҪеӘҪ","ејҹејҹ","еҰ№еҰ№","рҹҗ»","рҹ‘ҰрҹҸ»"];
const currency=["JPY","TWD","KRW","THB"];
let tab=0;

let data=JSON.parse(localStorage.getItem("bearTripV2")||`{
"rates":{"JPY":0.21,"TWD":1,"KRW":0.023,"THB":0.9},
"flight":{"go":"","back":"","note":""},
"days":[[],[],[],[],[]],
"expenses":[],
"splits":[],
"buy":[]
}`);

function save(){localStorage.setItem("bearTripV2",JSON.stringify(data))}
function twd(a,c){return Math.round(Number(a||0)*(data.rates[c]||1))}
function img(input,cb){let f=input.files[0];if(!f)return cb("");let r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(f)}
function setTab(i){tab=i;render()}
function renderNav(){nav.innerHTML=pages.map((p,i)=>`<button class="${i===tab?'on':''}" onclick="setTab(${i})">${p}</button>`).join("")}
function render(){renderNav();app.innerHTML=[home,flight,d1,d2,d3,d4,d5,expense,split,buy][tab]()}
function rateBox(){return `<div class="card"><h3>еҢҜзҺҮиЁӯе®ҡпјҡ1 еҺҹе№Ј = е№ҫе…ғеҸ°е№Ј</h3>${currency.map(c=>`<label>${c}<input type="number" step="0.001" value="${data.rates[c]}" onchange="data.rates['${c}']=Number(this.value);save();render()"></label>`).join("")}</div>`}

function home(){
let count=data.days.flat().length;
return `<div class="card"><h2>рҹҚҒ зҰҸеІЎ Autumn</h2><p>2026.10.10пјҚ10.14</p><div class="grid">
<div class="card"><b>иЎҢзЁӢ</b><div class="money">${count}</div></div>
<div class="card"><b>иЁҳеёі</b><div class="money">${data.expenses.length}</div></div>
<div class="card"><b>еҲҶж”Ө</b><div class="money">${data.splits.length}</div></div>
<div class="card"><b>еҝ…иІ·</b><div class="money">${data.buy.length}</div></div>
</div><button class="btn" onclick="setTab(2)">й–Ӣе§ӢиҰҸеҠғ Day1</button></div>`;
}

function flight(){
return `<div class="card"><h2>вңҲпёҸ иҲӘзҸӯ</h2>
<textarea id="go" placeholder="еҺ»зЁӢиіҮиЁҠ">${data.flight.go}</textarea>
<textarea id="back" placeholder="еӣһзЁӢиіҮиЁҠ">${data.flight.back}</textarea>
<textarea id="fnote" placeholder="еӮҷиЁ»">${data.flight.note}</textarea>
<button class="btn" onclick="data.flight={go:go.value,back:back.value,note:fnote.value};save();render()">е„Іеӯҳ</button>
</div>`;
}

function dayPage(d){
let list=data.days[d];
return `<div class="card"><h2>рҹҚӮ Day ${d+1}</h2>
<select id="type">${types.map(x=>`<option>${x}</option>`)}</select>
<input id="name" placeholder="еҗҚзЁұ">
<input id="map" placeholder="Google Maps йҖЈзөҗ">
<select id="trans">${transport.map(x=>`<option>${x}</option>`)}</select>
<input id="time" placeholder="з§»еӢ•жҷӮй–“пјҢдҫӢеҰӮ 20 еҲҶйҗҳ">
<textarea id="memo" placeholder="еӮҷиЁ»"></textarea>
<input id="photo" type="file" accept="image/*">
<button class="btn" onclick="addDay(${d})">ж–°еўһиЎҢзЁӢ</button>
</div>
${list.map((x,i)=>`<div class="card">
${x.photo?`<img class="pic" src="${x.photo}">`:""}
<h3>${x.type} ${x.name}</h3>
<p class="drive">${x.trans}пҪң${x.time||"жңӘеЎ«жҷӮй–“"}</p>
${x.memo?`<p class="note">рҹ“қ ${x.memo}</p>`:""}
${x.map?`<p><a href="${x.map}" target="_blank">рҹ“Қ й–Ӣе•ҹе°ҺиҲӘ</a></p>`:""}
<button class="btn btn2" onclick="moveDay(${d},${i},-1)">дёҠз§»</button>
<button class="btn btn2" onclick="moveDay(${d},${i},1)">дёӢз§»</button>
<button class="btn danger" onclick="delDay(${d},${i})">еҲӘйҷӨ</button>
</div>`).join("")}`;
}
function d1(){return dayPage(0)} function d2(){return dayPage(1)} function d3(){return dayPage(2)} function d4(){return dayPage(3)} function d5(){return dayPage(4)}
function addDay(d){img(photo,b=>{data.days[d].push({type:type.value,name:name.value,map:map.value,trans:trans.value,time:time.value,memo:memo.value,photo:b});save();render()})}
function delDay(d,i){data.days[d].splice(i,1);save();render()}
function moveDay(d,i,dir){let a=data.days[d],j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render()}

function expense(){
let totals={JPY:0,TWD:0,KRW:0,THB:0}, totalTwd=0;
data.expenses.forEach(x=>{totals[x.cur]+=Number(x.amount||0);totalTwd+=twd(x.amount,x.cur)});
return `${rateBox()}<div class="card"><h2>рҹ’° иЁҳеёі</h2>
<div class="grid">${currency.map(c=>`<div class="card"><b>${c}</b><div class="money">${totals[c]}</div></div>`).join("")}</div>
<div class="card"><b>зҙ„еҸ°е№ЈзёҪйЎҚ</b><div class="money">NT$ ${totalTwd}</div></div>
<input id="en" placeholder="й …зӣ®еҗҚзЁұ">
<input id="ea" type="number" placeholder="йҮ‘йЎҚ">
<select id="ec">${currency.map(c=>`<option>${c}</option>`)}</select>
<textarea id="em" placeholder="еӮҷиЁ»пјҢдҫӢеҰӮпјҡж”¶ж“ҡе·ІжӢҚ"></textarea>
<input id="er" type="file" accept="image/*">
<button class="btn" onclick="addExpense()">ж–°еўһиЁҳеёі</button>
</div>
${data.expenses.map((x,i)=>`<div class="card">
${x.receipt?`<img class="pic" src="${x.receipt}">`:""}
<h3>${x.name}</h3>
<div class="money">${x.amount} ${x.cur}</div>
<p>зҙ„ NT$ ${twd(x.amount,x.cur)}</p>
${x.memo?`<p class="note">рҹ“қ ${x.memo}</p>`:""}
<button class="btn danger" onclick="delExpense(${i})">еҲӘйҷӨ</button>
</div>`).join("")}`;
}
function addExpense(){img(er,b=>{data.expenses.push({name:en.value,amount:ea.value,cur:ec.value,memo:em.value,receipt:b});save();render()})}
function delExpense(i){data.expenses.splice(i,1);save();render()}

function split(){
let sums={};members.forEach(m=>sums[m]=0);
data.splits.forEach(x=>x.people.forEach(p=>sums[p]+=twd(x.amount,x.cur)/x.people.length));
return `${rateBox()}<div class="card"><h2>рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ еҲҶж”Ө</h2>
<div class="grid">${members.map(m=>`<div class="card"><b>${m}</b><div class="money">NT$ ${Math.round(sums[m])}</div></div>`).join("")}</div>
<input id="sn" placeholder="й …зӣ®">
<input id="sa" type="number" placeholder="зёҪйҮ‘йЎҚ">
<select id="sc">${currency.map(c=>`<option>${c}</option>`)}</select>
<div>${members.map(m=>`<label class="tag"><input type="checkbox" name="sp" value="${m}"> ${m}</label>`).join("")}</div>
<button class="btn" onclick="addSplit()">ж–°еўһеҲҶж”Ө</button>
</div>
${data.splits.map((x,i)=>`<div class="card">
<h3>${x.name}</h3>
<div class="money">${x.amount} ${x.cur}</div>
<p>зҙ„ NT$ ${twd(x.amount,x.cur)}</p>
<p>еҲҶж”Өпјҡ${x.people.join("гҖҒ")}</p>
<p>жҜҸдәәпјҡзҙ„ NT$ ${Math.round(twd(x.amount,x.cur)/x.people.length)}</p>
<button class="btn danger" onclick="delSplit(${i})">еҲӘйҷӨ</button>
</div>`).join("")}`;
}
function addSplit(){
let people=[...document.querySelectorAll("input[name=sp]:checked")].map(x=>x.value);
if(!people.length)return alert("и«ӢеӢҫйҒёеҲҶж”ӨжҲҗе“Ў");
data.splits.push({name:sn.value,amount:sa.value,cur:sc.value,people});save();render()
}
function delSplit(i){data.splits.splice(i,1);save();render()}

function buy(){
return `<div class="card"><h2>рҹӣҚ еҝ…иІ·</h2>
<input id="bn" placeholder="е•Ҷе“ҒеҗҚзЁұ">
<textarea id="bm" placeholder="еӮҷиЁ»"></textarea>
<input id="bp" type="file" accept="image/*">
<button class="btn" onclick="addBuy()">ж–°еўһ</button>
</div>
<div class="grid">${data.buy.map((x,i)=>`<div class="card">${x.pic?`<img class="pic" src="${x.pic}">`:""}<h3>${x.name}</h3>${x.memo?`<p class="note">${x.memo}</p>`:""}<button class="btn danger" onclick="delBuy(${i})">еҲӘйҷӨ</button></div>`).join("")}</div>`;
}
function addBuy(){img(bp,b=>{data.buy.push({name:bn.value,memo:bm.value,pic:b});save();render()})}
function delBuy(i){data.buy.splice(i,1);save();render()}

render();
</script>
</body>
</html>
