<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bear Travel Planner</title>
<style>
:root{--bg:#f7efe4;--card:#fffaf3;--brown:#5b3f2e;--soft:#d9b894;--accent:#b87545;--line:#ead9c7}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--brown);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif}
header{position:sticky;top:0;z-index:9;background:rgba(255,250,243,.95);padding:14px;border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
h1{margin:0;font-size:28px;font-family:"Kaiti TC","KaiTi",serif}.sub{font-size:13px;color:#9a7050;margin-top:3px}
nav{display:flex;gap:8px;overflow:auto;margin-top:12px}nav button{border:0;border-radius:999px;padding:9px 14px;background:#f0dfcc;color:var(--brown);white-space:nowrap}
nav button.on{background:var(--accent);color:white}.page{display:none;padding:16px}.page.on{display:block}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px;margin:12px 0;box-shadow:0 8px 20px #8b5e3c18}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px;margin:6px 0;background:white;color:var(--brown);font-size:16px}
textarea{min-height:70px}.btn{border:0;border-radius:14px;padding:11px 14px;background:var(--accent);color:white;font-weight:700}.btn2{background:#8b6548}.danger{background:#b95b4a}
.row{display:flex;gap:8px}.row>*{flex:1}.item{border-top:1px solid var(--line);padding:12px 0}.tag{display:inline-block;background:#f1dfcc;border-radius:999px;padding:4px 9px;margin:3px;font-size:12px}
img.pic{width:100%;max-height:190px;object-fit:cover;border-radius:16px;margin:8px 0}.money{font-size:25px;font-weight:800}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.small{font-size:13px;color:#9a7050}
footer{height:30px}
</style>
</head>
<body>
<header>
<h1>🧸 Bear Travel Planner</h1>
<div class="sub">🍁 福岡 Autumn｜Every journey becomes a beautiful memory.</div>
<nav id="nav"></nav>
</header>

<main id="app"></main>
<footer></footer>

<script>
const pages=["首頁","航班","D1","D2","D3","D4","D5","記帳","分攤","必買"];
const types=["🏯景點","🍜美食","🛍購物","☕咖啡廳","🌃夜景"];
const members=["爸爸","媽媽","弟弟","妹妹","🐻","👦🏻"];
let tab=0;
let data=JSON.parse(localStorage.getItem("bearTrip")||`{
"flight":{"go":"","back":"","note":""},
"days":[[],[],[],[],[]],
"expenses":[],
"splits":[],
"buy":[]
}`);
function save(){localStorage.setItem("bearTrip",JSON.stringify(data))}
function $(id){return document.getElementById(id)}
function imgToBase64(input,cb){let f=input.files[0];if(!f)return cb("");let r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(f)}
function setTab(i){tab=i;render()}

function renderNav(){
$("nav").innerHTML=pages.map((p,i)=>`<button class="${i==tab?'on':''}" onclick="setTab(${i})">${p}</button>`).join("");
}
function render(){
renderNav();
let html="";
if(tab==0) html=home();
if(tab==1) html=flight();
if(tab>=2&&tab<=6) html=day(tab-2);
if(tab==7) html=expense();
if(tab==8) html=split();
if(tab==9) html=buy();
$("app").innerHTML=html;
}
function home(){
let count=data.days.flat().length;
let total=data.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
return `<section class="page on">
<div class="card">
<h2>🍁 福岡 Autumn</h2>
<p>2026.10.10－10.14</p>
<p>👨‍👩‍👧‍👦 6 位旅伴</p>
<div class="grid">
<div class="card"><b>已排景點</b><div class="money">${count}</div></div>
<div class="card"><b>記帳筆數</b><div class="money">${data.expenses.length}</div></div>
<div class="card"><b>分攤筆數</b><div class="money">${data.splits.length}</div></div>
<div class="card"><b>必買清單</b><div class="money">${data.buy.length}</div></div>
</div>
<button class="btn" onclick="setTab(2)">開始規劃 Day1 →</button>
</div></section>`;
}
function flight(){
return `<section class="page on"><div class="card">
<h2>✈️ 航班資訊</h2>
<textarea id="go" placeholder="去程資訊">${data.flight.go||""}</textarea>
<textarea id="back" placeholder="回程資訊">${data.flight.back||""}</textarea>
<textarea id="fnote" placeholder="備註">${data.flight.note||""}</textarea>
<button class="btn" onclick="data.flight={go:go.value,back:back.value,note:fnote.value};save();render()">儲存航班</button>
</div></section>`;
}
function day(d){
let list=data.days[d];
return `<section class="page on"><div class="card">
<h2>🍂 Day ${d+1}</h2>
<select id="t">${types.map(x=>`<option>${x}</option>`).join("")}</select>
<input id="n" placeholder="名稱">
<input id="map" placeholder="Google Maps 連結">
<input id="drive" placeholder="車程時間，例如 20分鐘">
<textarea id="note" placeholder="備註"></textarea>
<input id="pic" type="file" accept="image/*">
<button class="btn" onclick="addDay(${d})">新增行程</button>
</div>
${list.map((x,i)=>`<div class="card">
${x.pic?`<img class="pic" src="${x.pic}">`:""}
<h3>${x.type} ${x.name}</h3>
<p>🚗 ${x.drive||"未填車程"}</p>
<p>${x.note||""}</p>
${x.map?`<p><a href="${x.map}" target="_blank">📍 開啟導航</a></p>`:""}
<button class="btn2 btn" onclick="moveDay(${d},${i},-1)">↑</button>
<button class="btn2 btn" onclick="moveDay(${d},${i},1)">↓</button>
<button class="danger btn" onclick="delDay(${d},${i})">刪除</button>
</div>`).join("")}</section>`;
}
function addDay(d){
imgToBase64(pic,b64=>{data.days[d].push({type:t.value,name:n.value,map:map.value,drive:drive.value,note:note.value,pic:b64});save();render()})
}
function delDay(d,i){data.days[d].splice(i,1);save();render()}
function moveDay(d,i,dir){let a=data.days[d],j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render()}

function expense(){
let totals={JPY:0,TWD:0,KRW:0,THB:0};data.expenses.forEach(x=>totals[x.cur]+=Number(x.amount||0));
return `<section class="page on"><div class="card">
<h2>💰 記帳</h2>
<div class="grid">
${Object.keys(totals).map(k=>`<div class="card"><b>${k}</b><div class="money">${totals[k]}</div></div>`).join("")}
</div>
<input id="en" placeholder="項目名稱">
<input id="ea" type="number" placeholder="金額">
<select id="ec"><option>JPY</option><option>TWD</option><option>KRW</option><option>THB</option></select>
<textarea id="em" placeholder="備註，例如：收據已拍"></textarea>
<button class="btn" onclick="addExpense()">新增記帳</button>
</div>
${data.expenses.map((x,i)=>`<div class="card"><h3>${x.name}</h3><div class="money">${x.amount} ${x.cur}</div><p>${x.memo||""}</p><button class="danger btn" onclick="delExpense(${i})">刪除</button></div>`).join("")}</section>`;
}
function addExpense(){data.expenses.push({name:en.value,amount:ea.value,cur:ec.value,memo:em.value});save();render()}
function delExpense(i){data.expenses.splice(i,1);save();render()}

function split(){
let sums={};members.forEach(m=>sums[m]=0);
data.splits.forEach(x=>x.people.forEach(p=>sums[p]+=Number(x.amount||0)/x.people.length));
return `<section class="page on"><div class="card">
<h2>👨‍👩‍👧‍👦 分攤</h2>
<div class="grid">${members.map(m=>`<div class="card"><b>${m}</b><div class="money">${Math.round(sums[m])}</div></div>`).join("")}</div>
<input id="sn" placeholder="項目">
<input id="sa" type="number" placeholder="總金額">
<div>${members.map(m=>`<label class="tag"><input type="checkbox" name="sp" value="${m}"> ${m}</label>`).join("")}</div>
<button class="btn" onclick="addSplit()">新增分攤</button>
</div>
${data.splits.map((x,i)=>`<div class="card"><h3>${x.name}</h3><div class="money">${x.amount}</div><p>分攤：${x.people.join("、")}</p><p>每人：${Math.round(Number(x.amount)/x.people.length)}</p><button class="danger btn" onclick="delSplit(${i})">刪除</button></div>`).join("")}</section>`;
}
function addSplit(){
let people=[...document.querySelectorAll("input[name=sp]:checked")].map(x=>x.value);
if(!people.length)return alert("請勾選分攤成員");
data.splits.push({name:sn.value,amount:sa.value,people});save();render()
}
function delSplit(i){data.splits.splice(i,1);save();render()}

function buy(){
return `<section class="page on"><div class="card">
<h2>🛍 必買清單</h2>
<input id="bn" placeholder="商品名稱">
<textarea id="bm" placeholder="備註"></textarea>
<input id="bp" type="file" accept="image/*">
<button class="btn" onclick="addBuy()">新增必買</button>
</div>
<div class="grid">${data.buy.map((x,i)=>`<div class="card">${x.pic?`<img class="pic" src="${x.pic}">`:""}<h3>${x.name}</h3><p>${x.memo||""}</p><button class="danger btn" onclick="delBuy(${i})">刪除</button></div>`).join("")}</div></section>`;
}
function addBuy(){imgToBase64(bp,b64=>{data.buy.push({name:bn.value,memo:bm.value,pic:b64});save();render()})}
function delBuy(i){data.buy.splice(i,1);save();render()}

render();
</script>
</body>
</html>
