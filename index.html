<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>福岡 Autumn Travel Planner</title>
  <link rel="stylesheet" href="style.css?v=preserve20260706" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#c9824a" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
  <header class="app-header">
    <div class="title-row">
      <div>
        <h1 id="mainTitle">🍁 福岡 Autumn | 2026.10.10－10.14</h1>

      </div>

  <main id="app"></main>

  <div id="modal" class="modal hidden">
    <div class="sheet">
      <div class="handle"></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="app.js?v=preserve20260706"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('./sw.js?v=preserve20260706').then(function(reg){ if(reg&&reg.update) reg.update(); }).catch(function(){});
      });
    }
  </script>

</html>
